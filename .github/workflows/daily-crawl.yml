name: Daily Job Crawl

on:
  schedule:
    # Run at 02:00 UTC every day (10:00 SGT)
    - cron: '0 2 * * *'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      source:
        description: 'Job source to crawl (mcf | cag | all)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          # Invalidate cache only when embedding model changes (tracked via pyproject.toml)
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run incremental crawl (MCF + Careers@Gov)
        run: uv run mcf crawl-incremental --source ${{ github.event.inputs.source || 'all' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional: set rate limit lower to be polite
          # Pass as CLI arg if needed: --rate-limit 2

      - name: Print summary
        if: always()
        run: echo "Crawl finished at $(date -u)"
